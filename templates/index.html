```
<style>
    body {
        margin: 0;

    .header {
        background-color: #2c3e50;
        padding: 20px;
        color: white;
        text-align: center;
    }

        text-align: center;

    .btn {
        display: inline-block;
        padding: 12px 20px;
        margin: 10px;
        background: #ff9800;
        color: white;
        text-decoration: none;
        border-radius: 8px;
        font-weight: bold;
        transition: 0.3s;
    }

    .btn:hover {
        background: #e68900;
    }

    .footer {
        text-align: center;
        margin-top: 50px;
        color: #555;
    }
</style>
