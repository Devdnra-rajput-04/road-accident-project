<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #dfe9f3, #ffffff);
            text-align: center;
        }

        h1 {
            margin-top: 20px;
            color: #2c3e50;
        }

        .card {
            width: 60%;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }
    </style>
</head>

<body>

<h1>📊 Dashboard</h1>

<div class="card">
    <canvas id="myChart"></canvas>
</div>

<script>
const ctx = document.getElementById('myChart');

new Chart(ctx, {
    type: 'bar',
    data: {
        labels: ['Accidents', 'Injuries'],
        datasets: [{
            label: 'Statistics',
            data: [{{ total_accidents }}, {{ total_injuries }}],
            backgroundColor: ['red', 'blue']
        }]
    }
});
</script>

</body>
</html>
